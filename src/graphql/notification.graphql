type Query {
  myNotifications(pagination: PaginationInput): NotificationResponse
  notificationsCount: Int
}

type NotificationResponse {
  data: [Notification]
  pagination: PaginationMeta
}

type Notification {
  id: ID
  title: String
  body: String
  created_at: DateTime
}

type Subscription {
  notificationReceived: Notification
}
